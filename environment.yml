name: amls2026
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # data / io
  - numpy=1.26.4
  - pandas=2.2.2
  - pyarrow=16.1.0
  - pillow=10.4.0
  # ml
  - scikit-learn=1.5.1
  - tqdm=4.66.5
  # notebook / plotting (not needed in Docker, harmless to include)
  - matplotlib=3.9.2
  - ipykernel=6.29.5
  - pip:
      # torch CPU -- GPU wheel from default PyPI exceeds the 4 GB Docker limit
      - torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
